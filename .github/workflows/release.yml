name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes for this version
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Pull the section for this version from RELEASE_NOTES.md
          NOTES=$(awk "/^## v${VERSION}[[:space:]]/{found=1; next} found && /^## v/{exit} found{print}" RELEASE_NOTES.md)

          if [ -z "$NOTES" ]; then
            NOTES="See [RELEASE_NOTES.md](RELEASE_NOTES.md) for full details."
          fi

          # Write to a file to safely pass multi-line content to later steps
          echo "$NOTES" > /tmp/release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
